<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ধন্যবাদ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(135deg, #eef3ef, #f7faf7);
      font-family: 'Hind Siliguri', 'DM Sans', sans-serif;
      color: #16351f;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 18px;
      padding: 36px 28px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      color: #0d3d1f;
    }

    p {
      margin: 8px 0;
      font-size: 16px;
      line-height: 1.7;
      color: #35513d;
    }

    a {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 20px;
      border-radius: 999px;
      background: #1f6d35;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
    }

    a:hover {
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ধন্যবাদ</h1>
    <p>আপনার সদস্যপদ নিবন্ধন সফলভাবে জমা হয়েছে।</p>
    <p>Thank you. Your registration has been submitted successfully.</p>
    <a href="./">ফর্মে ফিরে যান</a>
  </div>
</body>
</html>
